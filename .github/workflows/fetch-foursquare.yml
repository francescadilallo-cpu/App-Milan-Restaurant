name: Fetch Foursquare data

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/fetch-foursquare.yml']
  schedule:
    - cron: '0 4 * * 1'  # ogni lunedì alle 04:00 UTC

jobs:
  fetch:
    name: Fetch e salva dati Foursquare
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch dati da Foursquare
        env:
          FSQ_KEY: ${{ secrets.FOURSQUARE_API_KEY }}
        run: python3 .github/scripts/fetch_foursquare.py

      - name: Commit dati aggiornati
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add docs/foursquare-data.json
          git diff --cached --quiet || git commit -m "chore: aggiorna dati Foursquare [skip ci]"
          git push
