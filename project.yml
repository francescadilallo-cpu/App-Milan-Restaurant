name: MilanoLocali
options:
  bundleIdPrefix: com.francescadilallo
  deploymentTarget:
    iOS: "17.0"

targets:
  MilanoLocali:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: MilanoLocali
        excludes:
          - Info.plist   # generato da Xcode, non da includere come risorsa

    settings:
      base:
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.francescadilallo.milanolocali
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        # Xcode genera Info.plist automaticamente dai INFOPLIST_KEY_* settings
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Milano Locali"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
