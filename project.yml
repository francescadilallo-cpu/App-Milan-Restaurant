name: MilanoLocali
options:
  bundleIdPrefix: com.francescadilallo
  deploymentTarget:
    iOS: "17.0"

targets:
  MilanoLocali:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # XcodeGen auto-scopre tutti i .swift come sorgenti
    # e i .json/.xcassets/etc. come risorse
    sources:
      - path: MilanoLocali

    # Info.plist generato da XcodeGen (niente file separato)
    info:
      path: MilanoLocali/Info.plist
      properties:
        CFBundleDisplayName: Milano Locali
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"          # iPhone
        PRODUCT_BUNDLE_IDENTIFIER: com.francescadilallo.milanolocali
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
