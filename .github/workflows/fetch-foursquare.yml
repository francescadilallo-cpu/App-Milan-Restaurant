name: Fetch Foursquare data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # ogni lunedì alle 04:00 UTC

concurrency:
  group: fetch-foursquare
  cancel-in-progress: false

jobs:
  fetch:
    name: Fetch e salva dati Foursquare
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch dati da Foursquare
        env:
          FSQ_KEY: ${{ secrets.FOURSQUARE_API_KEY }}
        run: python3 .github/scripts/fetch_foursquare.py

      - name: Commit e push dati aggiornati
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/foursquare-data.json
          if git diff --cached --quiet; then
            echo "Nessuna modifica ai dati, skip."
            exit 0
          fi
          git commit -m "chore: aggiorna dati Foursquare [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push tentativo $i fallito, retry in 10s..."
            sleep 10
          done
