name: Build

on:
  push:
    branches: [main, "claude/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build iOS (Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Available simulators
        run: xcrun simctl list devices available --json | python3 -c "
import json,sys
d=json.load(sys.stdin)['devices']
iphones=[s for v in d.values() for s in v if 'iPhone' in s.get('name','') and s.get('isAvailable')]
[print(s['name'], s.get('runtimeIdentifier','')) for s in iphones[:10]]
"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build for simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project MilanoLocali.xcodeproj \
            -scheme MilanoLocali \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1
